# Docker compose entry point.  Self-contained: all Python source the sidecar
# needs is vendored under sidecar/python/, so this stack has no external
# project dependencies.
#
#     docker compose up --build
#
# Services & ports:
#   frontend    :${FRONTEND_PORT:-80}   React UI + nginx gateway proxy
#   gateway     :8000                   Go API (internal; also exposed for direct access)
#   sidecar     :8001                   Python skills & memory (internal)
#   telegram-bot (no port)              Telegram bot

services:

  sidecar:
    build:
      context: .
      dockerfile: docker/sidecar.Dockerfile
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://127.0.0.1:11434}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-120}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_EMBED_MODEL=${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      - OPENAI_TIMEOUT=${OPENAI_TIMEOUT:-120}
      - AGENT_VECTOR_COLLECTION=${AGENT_VECTOR_COLLECTION:-memories}
      - AGENT_DEDUP_DISTANCE=${AGENT_DEDUP_DISTANCE:-0.08}
      - SKILL_HTTP_TIMEOUT=${SKILL_HTTP_TIMEOUT:-30}
      - SKILL_SHELL_ENABLED=${SKILL_SHELL_ENABLED:-false}
      - SKILL_SSH_ENABLED=${SKILL_SSH_ENABLED:-false}
      - SKILL_SSH_IDENTITY_FILE=${SKILL_SSH_IDENTITY_FILE:-}
      - SKILL_SSH_DEFAULT_USER=${SKILL_SSH_DEFAULT_USER:-}
      - SKILL_SSH_PRIVATE_KEY=${SKILL_SSH_PRIVATE_KEY:-}
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8001:8001"

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    env_file:
      - .env
    environment:
      - BACKEND_PORT=8000
      - DATA_DIR=/app/data
      - SIDECAR_URL=http://sidecar:8001
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://127.0.0.1:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3:latest}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-120}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      - OPENAI_TIMEOUT=${OPENAI_TIMEOUT:-120}
      - OPENAI_API_MODE=${OPENAI_API_MODE:-}
      - OPENAI_REASONING_EFFORT=${OPENAI_REASONING_EFFORT:-medium}
      - AGENT_CONTEXT_TAIL=${AGENT_CONTEXT_TAIL:-30}
      - AGENT_MEMORY_HITS=${AGENT_MEMORY_HITS:-5}
      - SCHEDULER_DB=/app/data/scheduler.sqlite3
      - SCHEDULER_TICK_SEC=60
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      - sidecar
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - gateway
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-80}:80"

  telegram-bot:
    build:
      context: .
      dockerfile: docker/telegram.Dockerfile
    env_file:
      - .env
    environment:
      - GATEWAY_URL=http://gateway:8000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BOT_AUTH_ENABLED=${BOT_AUTH_ENABLED:-false}
      - BOT_ADMIN_ID=${BOT_ADMIN_ID:-0}
      - BOT_AUTH_DB=/app/data/telegram_auth.sqlite3
    depends_on:
      - gateway
    volumes:
      - ./data:/app/data
